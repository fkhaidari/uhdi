name: build-tools

# Bakes the bench toolchain image and pushes to ghcr.io/<owner>/uhdi-tools:<tag>
# where <tag> = sha256(versions.env + Dockerfile + entrypoint.sh)[:16].

on:
  pull_request:
    paths: ['tools/**']
  push:
    branches: [main]
    paths: ['tools/**']
  workflow_dispatch:

concurrency:
  group: build-tools-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Compute deterministic tag and lowercase image ref
        id: tag
        # GHCR rejects mixed-case path segments; lowercase once.
        run: |
          tag=$(tools/docker/compute-tag.sh)
          owner_lc="${GITHUB_REPOSITORY_OWNER,,}"
          {
              echo "tag=$tag"
              echo "owner_lc=$owner_lc"
          } >> "$GITHUB_OUTPUT"

      - name: Verify tools/docker/image-tag.txt is in sync
        run: tools/docker/check-tag.sh

      - name: Set up Docker buildx
        uses: docker/setup-buildx-action@v3

      # Login (and push below) on PRs too: ci.yml's bench job pulls
      # ghcr.io/<owner>/uhdi-tools:<tag-from-image-tag.txt>, so the
      # tag has to be on GHCR before bench runs. Tags are content-
      # addressed so PR images don't clash with main; :latest stays
      # main-only via the conditional in `tags:` below.
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve build args from versions.env
        id: args
        run: |
          # Only keys declared as ARG in Dockerfile.
          set -a
          # shellcheck disable=SC1091
          . tools/versions.env
          set +a
          {
              echo 'build-args<<EOF'
              for key in \
                  CIRCT_URL CIRCT_REV \
                  LLVM_URL LLVM_REV \
                  HGDB_CIRCT_URL HGDB_CIRCT_REV \
                  HGDB_CIRCT_LLVM_URL HGDB_CIRCT_LLVM_REV \
                  HGDB_FIRRTL_URL HGDB_FIRRTL_REV \
                  HGDB_URL HGDB_REV \
                  CHISEL_TYWAVES_URL CHISEL_TYWAVES_REV \
                  CHISEL_UHDI_URL CHISEL_UHDI_REV \
                  TYWAVES_URL TYWAVES_REV \
                  CHISEL_STOCK_VERSION SCALA_CLI_VERSION; do
                  printf '%s=%s\n' "$key" "${!key}"
              done
              echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: tools/docker
          file: tools/docker/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.tag.outputs.owner_lc }}/uhdi-tools:${{ steps.tag.outputs.tag }}
            ${{ github.ref == 'refs/heads/main' && format('ghcr.io/{0}/uhdi-tools:latest', steps.tag.outputs.owner_lc) || '' }}
          build-args: ${{ steps.args.outputs.build-args }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
