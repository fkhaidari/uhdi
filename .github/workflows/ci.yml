name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-flight runs for the same ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  converter:
    name: converter pytest (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install converter + dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -e './converter[dev]'
          pip install coverage[toml]

      - name: Run pytest under coverage
        # `coverage report` reads fail_under from pyproject.toml.
        working-directory: converter
        run: |
          coverage run --branch --source=src -m pytest -v
          coverage report
          coverage xml -o coverage.xml

      - name: Upload coverage XML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: converter-coverage-${{ matrix.python-version }}
          path: converter/coverage.xml
          if-no-files-found: ignore

  build-image:
    name: build uhdi-tools image
    # Bakes the bench toolchain image and pushes to ghcr.io/<owner>/uhdi-tools:<tag>
    # where <tag> = sha256(versions.env + Dockerfile + entrypoint.sh)[:16].
    # Short-circuits when the tag is already on GHCR (most PRs don't touch
    # tools/**, so image-tag.txt is unchanged and the existing image is fine).
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      ref: ${{ steps.tag.outputs.ref }}
    steps:
      - uses: actions/checkout@v4

      - name: Compute deterministic tag
        id: tag
        # GHCR rejects mixed-case path segments; lowercase the owner once.
        run: |
          tag=$(tools/docker/compute-tag.sh)
          owner_lc="${GITHUB_REPOSITORY_OWNER,,}"
          ref="ghcr.io/${owner_lc}/uhdi-tools:${tag}"
          {
              echo "tag=$tag"
              echo "owner_lc=$owner_lc"
              echo "ref=$ref"
          } >> "$GITHUB_OUTPUT"

      - name: Verify tools/docker/image-tag.txt is in sync
        run: tools/docker/check-tag.sh

      - name: Log in to GHCR
        # Login (and push below) on PRs too: bench pulls the same tag, so
        # the image has to be on GHCR before bench runs. Tags are content-
        # addressed so PR images don't clash with main; :latest stays
        # main-only via the conditional in `tags:` below.
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Check if image already exists on GHCR
        id: check
        run: |
          if docker manifest inspect "${{ steps.tag.outputs.ref }}" >/dev/null 2>&1; then
              echo "exists=true" >> "$GITHUB_OUTPUT"
              echo "Image already on GHCR; build will be skipped."
          else
              echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Docker buildx
        if: steps.check.outputs.exists != 'true'
        uses: docker/setup-buildx-action@v3

      - name: Resolve build args from versions.env
        if: steps.check.outputs.exists != 'true'
        id: args
        run: |
          # Only keys declared as ARG in Dockerfile.
          set -a
          # shellcheck disable=SC1091
          . tools/versions.env
          set +a
          {
              echo 'build-args<<EOF'
              for key in \
                  CIRCT_URL CIRCT_REV \
                  LLVM_URL LLVM_REV \
                  HGDB_CIRCT_URL HGDB_CIRCT_REV \
                  HGDB_CIRCT_LLVM_URL HGDB_CIRCT_LLVM_REV \
                  HGDB_FIRRTL_URL HGDB_FIRRTL_REV \
                  HGDB_URL HGDB_REV \
                  CHISEL_TYWAVES_URL CHISEL_TYWAVES_REV \
                  CHISEL_UHDI_URL CHISEL_UHDI_REV \
                  TYWAVES_URL TYWAVES_REV \
                  CHISEL_STOCK_VERSION SCALA_CLI_VERSION; do
                  printf '%s=%s\n' "$key" "${!key}"
              done
              echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Build and push
        if: steps.check.outputs.exists != 'true'
        uses: docker/build-push-action@v6
        with:
          context: tools/docker
          file: tools/docker/Dockerfile
          push: true
          tags: |
            ${{ steps.tag.outputs.ref }}
            ${{ github.ref == 'refs/heads/main' && format('ghcr.io/{0}/uhdi-tools:latest', steps.tag.outputs.owner_lc) || '' }}
          build-args: ${{ steps.args.outputs.build-args }}
          # Two-layer cache: GHA (per-PR scope keeps mode=max for all stages)
          # plus the registry image's inline metadata. The shared `main`-scoped
          # GHA entry lets PRs read from the last main build; PRs write to their
          # own scope so concurrent runs don't fight. The inline export embeds
          # cache metadata into the pushed image itself, so a local
          # tools/docker/build-and-push.sh --push can hit the same cache via
          # --cache-from ghcr.io/<owner>/uhdi-tools.
          cache-from: |
            type=gha,scope=build-tools-${{ github.ref_name }}
            type=gha,scope=build-tools-main
            type=registry,ref=ghcr.io/${{ steps.tag.outputs.owner_lc }}/uhdi-tools:latest
          cache-to: |
            type=gha,mode=max,scope=build-tools-${{ github.ref_name }}
            type=inline

  bench:
    name: bench pytest (in uhdi-tools container)
    runs-on: ubuntu-latest
    needs: build-image
    steps:
      - uses: actions/checkout@v4

      - name: Pull uhdi-tools image
        run: docker pull "${{ needs.build-image.outputs.ref }}"

      - name: Run bench in container
        run: |
          docker run --rm \
              -v "$PWD":/work -w /work \
              -e PIP_DISABLE_PIP_VERSION_CHECK=1 \
              "${{ needs.build-image.outputs.ref }}" \
              bash -c '
                  set -euo pipefail
                  pip install --break-system-packages -e ./converter -e "./bench[dev]"
                  cd bench && pytest -v
              '

  ruff:
    name: ruff (lint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install ruff
        run: pip install ruff
      - name: Lint
        run: ruff check converter/src converter/test bench/src bench/test

  mypy:
    name: mypy (type check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e './converter[dev]' -e './bench'
          pip install mypy
      - name: Type-check converter common surface
        # Strict only on uhdi_common; emitter/bench glue keep Dict[str, Any].
        run: mypy converter/src/uhdi_common

  install-sh:
    name: install.sh end-to-end (linux-x86_64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Syntax-check shell scripts
        run: |
          bash -n tools/install.sh
          bash -n tools/test-install.sh
          bash -n tools/release/release-firtool.sh
          bash -n tools/release/release-chisel.sh
          bash -n tools/release/release-hgdb-py.sh

      - name: Run tools/test-install.sh
        env:
          # Authenticated request bumps the GitHub API rate limit from
          # 60/hr (anon) to 1000/hr, which the matrix-of-3 install.sh
          # calls in test-install.sh blow through otherwise.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: tools/test-install.sh
